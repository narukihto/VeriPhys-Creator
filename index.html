<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPhys Protocol | Quantum-Safe Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #020617;
            --card-bg: rgba(13, 22, 38, 0.7);
            --text: #f8fafc;
            --accent: #00ff88;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(0, 210, 255, 0.4);
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* --- Interactive Background Background --- */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .container { width: 100%; max-width: 1100px; z-index: 2; }

        /* --- Header Styling --- */
        .header { text-align: center; margin-bottom: 4rem; animation: fadeInDown 1s ease; }
        .header h1 {
            font-size: 4rem; margin: 0; font-weight: 700; letter-spacing: -3px;
            background: linear-gradient(135deg, #fff 30%, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--glow));
        }
        .header p { color: var(--primary); letter-spacing: 6px; font-weight: 500; font-size: 0.9rem; margin-top: 10px; }

        /* --- Main Logic Cards --- */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 2.5rem;
            padding: 3.5rem;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.6);
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
        }

        /* --- Advanced Upload Zone --- */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 2rem;
            padding: 6rem 2rem;
            cursor: pointer;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.05);
            transform: scale(1.01);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.1);
        }

        .drop-icon { font-size: 5rem; display: block; margin-bottom: 1.5rem; filter: drop-shadow(0 0 15px var(--primary)); }

        /* --- Result & Hash Display --- */
        #result-area { display: none; animation: slideUp 0.8s ease; }

        .hash-box {
            background: rgba(0,0,0,0.5);
            padding: 2rem;
            border-radius: 1.5rem;
            font-family: 'Fira Code', monospace;
            border-left: 5px solid var(--accent);
            margin: 2rem 0;
            word-break: break-all;
            position: relative;
        }

        .hash-label { color: #64748b; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .hash-text { color: var(--accent); font-size: 1.1rem; }

        /* --- Buttons --- */
        .btn {
            display: inline-block; width: 100%; padding: 1.3rem; border-radius: 1.2rem;
            text-align: center; font-weight: 800; text-decoration: none; font-size: 1rem;
            letter-spacing: 2px; cursor: pointer; border: none;
        }
        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; box-shadow: 0 15px 35px rgba(0, 210, 255, 0.3);
        }
        .btn-main:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* --- Global Ledger Table --- */
        .ledger-wrapper { overflow-x: auto; }
        .ledger-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .ledger-table th { color: #64748b; font-size: 0.8rem; text-transform: uppercase; padding: 1rem; text-align: left; }
        .ledger-table td { background: rgba(255,255,255,0.03); padding: 1.5rem; font-size: 0.95rem; }
        .ledger-table tr td:first-child { border-radius: 1.2rem 0 0 1.2rem; font-weight: 700; }
        .ledger-table tr td:last-child { border-radius: 0 1.2rem 1.2rem 0; text-align: right; }

        .badge { background: rgba(0, 255, 136, 0.15); color: var(--accent); padding: 6px 16px; border-radius: 50px; font-size: 0.75rem; font-weight: 900; }

        /* --- Animations --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 2s linear infinite; display: inline-block; }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="container">
    <header class="header">
        <h1>VERIPHYS CORE</h1>
        <p>INDUSTRIAL-GRADE ASSET ANCHORING</p>
    </header>

    <div class="glass-card">
        <label class="drop-zone" id="dropZone">
            <span class="drop-icon">🛡️</span>
            <h3 style="margin:0; font-size: 1.8rem;">Secure Digital Asset</h3>
            <p style="margin-top:10px;">Drag & drop any file to initiate SHA3-256 fingerprinting</p>
            <input type="file" id="fileInput" hidden>
        </label>

        <div id="result-area">
            <div class="hash-box">
                <span class="hash-label">Quantum-Resistant SHA3 Fingerprint</span>
                <span class="hash-text" id="hashValue"></span>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <span id="timeValue" style="color: #94a3b8; font-size: 0.9rem;"></span>
                <span class="badge">BLOCKCHAIN IMMUTABLE</span>
            </div>

            <a id="downloadBtn" class="btn btn-main">GENERATE CRYPTO-CERTIFICATE</a>
            
            <div style="text-align: center; margin-top: 2rem;">
                <a id="explorerBtn" href="#" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.85rem;">VIEW TRANSACTION ON ETHERSCAN ↗</a>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h2 style="font-size: 1.8rem; margin-bottom: 2rem;">📁 Immutable Global Registry</h2>
        <div class="ledger-wrapper">
            <table class="ledger-table">
                <thead>
                    <tr>
                        <th>Asset Name</th>
                        <th>Cryptographic Hash</th>
                        <th>Verification Status</th>
                    </tr>
                </thead>
                <tbody id="registryTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>



<script>
    // --- PARTICLE BACKGROUND ENGINE ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.speedX = Math.random() * 0.4 - 0.2;
            this.speedY = Math.random() * 0.4 - 0.2;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0;
            if (this.x < 0) this.x = canvas.width; if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 210, 255, 0.4)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function initParticles() {
        for (let i = 0; i < 120; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    initParticles(); animate();

    // --- PROTOCOL LOGIC ---
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const resultArea = document.getElementById('result-area');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Visual Loading State
        dropZone.innerHTML = `<span class="drop-icon spin">⚙️</span><h3 style="margin:0;">Anchoring Asset...</h3><p>Verifying Physical Physics & Broadcasting to Ledger</p>`;
        
        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('http://127.0.0.1:3000/v1/anchor', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.status === "Success") {
                document.getElementById('hashValue').innerText = result.content_hash;
                document.getElementById('timeValue').innerText = `ANCHORED: ${new Date().toLocaleString()}`;
                document.getElementById('explorerBtn').href = `https://sepolia.etherscan.io/tx/${result.tx_hash}`;
                
                resultArea.style.display = 'block';
                dropZone.style.display = "none";

                // Generate Dynamic Certificate File
                const certContent = `
VERIPHYS PROTOCOL - OFFICIAL AUTHENTICITY CERTIFICATE
=====================================================
ASSET NAME: ${file.name}
SHA3-256 FINGERPRINT: ${result.content_hash}
BLOCKCHAIN TX HASH: ${result.tx_hash}
LEDGER STATUS: IMMUTABLE & SECURED
TIMESTAMP (UTC): ${new Date().toISOString()}
=====================================================
This document serves as proof that the digital asset's 
integrity was anchored at the block height specified.
`;
                const blob = new Blob([certContent], {type: 'text/plain'});
                const url = window.URL.createObjectURL(blob);
                const dBtn = document.getElementById('downloadBtn');
                dBtn.href = url; dBtn.download = `VeriPhys_Cert_${file.name.split('.')[0]}.txt`;

                loadRegistry();
            }
        } catch (err) {
            alert("PROTOCOL ERROR: Core Engine is Offline. Please start the Rust server.");
            location.reload();
        }
    });

    async function loadRegistry() {
        try {
            const resp = await fetch('http://127.0.0.1:3000/v1/registry');
            const data = await resp.json();
            document.getElementById('registryTable').innerHTML = data.map(r => `
                <tr>
                    <td>${r.file_name}</td>
                    <td style="font-family:'Fira Code'; color:var(--primary); font-size:0.8rem;">${r.file_hash.substring(0,30)}...</td>
                    <td><span class="badge">VALIDATED</span></td>
                </tr>
            `).join('');
        } catch (e) { console.warn("Registry load failed - Check API status."); }
    }
    window.onload = loadRegistry;
</script>
</body>
</html>
