<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPhys Protocol | Quantum-Safe Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #020617;
            --card-bg: rgba(13, 22, 38, 0.8);
            --text: #f8fafc;
            --accent: #00ff88;
            --danger: #ff4b2b;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(0, 210, 255, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Animated Background Particles */
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.4; }

        .container { width: 100%; max-width: 1000px; z-index: 1; }

        .header-brand { text-align: center; margin-bottom: 3rem; }
        .header-brand h1 { 
            font-size: 3.5rem; margin: 0; letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--glow));
        }

        .card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2.5rem;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
        }

        .card::after {
            content: ""; position: absolute; inset: 0; border-radius: 2.5rem;
            padding: 2px; background: linear-gradient(135deg, var(--border), transparent, var(--border));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }

        /* Enhanced Upload Zone */
        .upload-section {
            border: 2px dashed var(--border);
            padding: 5rem 2rem;
            border-radius: 2rem;
            cursor: pointer;
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            position: relative;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.04);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .upload-icon { font-size: 4rem; filter: drop-shadow(0 0 10px var(--primary)); display: block; margin-bottom: 1rem; }

        /* Dynamic Result Area */
        #result-area { display: none; animation: slideUp 0.8s ease; }

        .hash-display {
            background: rgba(0,0,0,0.4);
            padding: 1.5rem;
            border-radius: 1.2rem;
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            border-left: 4px solid var(--accent);
            margin: 2rem 0;
            font-size: 0.95rem;
            word-break: break-all;
            box-shadow: inset 5px 0 20px rgba(0, 255, 136, 0.05);
        }

        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            width: 100%;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.2);
            border: none;
        }

        .btn-primary:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Global Ledger Table */
        .ledger-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .ledger-table th { color: #64748b; font-size: 0.8rem; text-transform: uppercase; padding: 1rem; text-align: left; }
        .ledger-table td { background: rgba(255,255,255,0.03); padding: 1.2rem; font-size: 0.9rem; }
        .ledger-table tr td:first-child { border-radius: 1rem 0 0 1rem; }
        .ledger-table tr td:last-child { border-radius: 0 1rem 1rem 0; }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 900;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .loading-spin { animation: spin 2s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="container">
    <div class="header-brand">
        <h1>VERIPHYS CORE</h1>
        <p style="color: var(--primary); font-weight: 500; letter-spacing: 5px;">QUANTUM-SAFE LEDGER PROTOCOL</p>
    </div>

    <div class="card">
        <label class="upload-section" id="dropZone">
            <span class="upload-icon">💠</span>
            <span style="font-size: 1.2rem; font-weight: 700;">Initiate Protocol Anchoring</span><br>
            <span style="color: #64748b;">Drop any physical asset to generate SHA3 fingerprint</span>
            <input type="file" id="fileInput" hidden>
        </label>

        <div id="result-area">
            <div class="hash-display" id="hashValue"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <span id="timeValue" style="color: #94a3b8; font-size: 0.85rem;"></span>
                <span class="status-badge">ON-CHAIN VERIFIED</span>
            </div>
            <a id="downloadBtn" class="btn btn-primary">DOWNLOAD CERTIFICATE</a>
            <p style="text-align: center; margin-top: 2rem;">
                <a id="explorerBtn" href="#" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: 700;">VIEW ON ETHERSCAN ↗</a>
            </p>
        </div>
    </div>

    <div class="card">
        <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">📁 IMMUTABLE REGISTRY</h2>
        <div style="overflow-x: auto;">
            <table class="ledger-table">
                <thead>
                    <tr>
                        <th>Asset Identifier</th>
                        <th>Cryptographic Fingerprint</th>
                        <th>Validation</th>
                    </tr>
                </thead>
                <tbody id="registryTable"></tbody>
            </table>
        </div>
    </div>
</div>



<script>
    // --- Particle Background Engine ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 210, 255, 0.5)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    function initParticles() {
        for (let i = 0; i < 100; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    initParticles(); animate();

    // --- Protocol Logic ---
    const fileInput = document.getElementById('fileInput');
    const resultArea = document.getElementById('result-area');
    const hashValue = document.getElementById('hashValue');
    const dropZone = document.getElementById('dropZone');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        dropZone.innerHTML = `<span class="upload-icon loading-spin">⚙️</span><br><strong>Hashing Asset...</strong>`;
        
        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('http://127.0.0.1:3000/v1/anchor', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.status === "Success") {
                hashValue.innerHTML = `<span style="color:#64748b">SHA3_256 //</span> ${result.content_hash}`;
                document.getElementById('timeValue').innerText = `TIMESTAMP: ${new Date().toLocaleString()}`;
                document.getElementById('explorerBtn').href = `https://sepolia.etherscan.io/tx/${result.tx_hash}`;
                
                resultArea.style.display = 'block';
                dropZone.style.display = "none";

                // Cert Generation
                const cert = `VERIPHYS LEDGER CERTIFICATE\n--------------------------\nASSET: ${file.name}\nHASH: ${result.content_hash}\nTX: ${result.tx_hash}\nSTATUS: IMMUTABLE`;
                const blob = new Blob([cert], {type: 'text/plain'});
                const url = window.URL.createObjectURL(blob);
                const btn = document.getElementById('downloadBtn');
                btn.href = url; btn.download = `Cert_${file.name}.txt`;

                loadRegistry();
            }
        } catch (err) {
            alert("PROTOCOL ERROR: Engine Offline");
            location.reload();
        }
    });

    async function loadRegistry() {
        const resp = await fetch('http://127.0.0.1:3000/v1/registry');
        const data = await resp.json();
        document.getElementById('registryTable').innerHTML = data.map(r => `
            <tr>
                <td style="font-weight:700">${r.file_name}</td>
                <td style="font-family:'Fira Code'; color:var(--primary)">${r.file_hash.substring(0,20)}...</td>
                <td><span class="status-badge">SECURED</span></td>
            </tr>
        `).join('');
    }
    window.onload = loadRegistry;
</script>
</body>
</html>
