[package]
name = "veriphys-protocol-core"
version = "1.0.0"
authors = ["narukihto"]
edition = "2021"

[dependencies]
# Modern Async & Web stack
axum = { version = "0.7.9", features = ["multipart"] }
tokio = { version = "1.36", features = ["full"] }
tower-http = { version = "0.5.2", features = ["cors", "limit"] }
ethers = { version = "2.0.14", features = ["rustls", "abigen", "ws"] }
rustls-pemfile = "2.2.0"

[patch.crates-io] 
ring = { git = "https://github.com/briansmith/ring", branch = "main" }
# Environment & Serialization
dotenvy = "0.15.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
sha3 = "0.10.8"
hex = "0.4"

# Blockchain with Rustls
ethers = { version = "2.0.14", features = ["rustls", "abigen", "ws"] }
rustls-pemfile = "2.2.0"

[patch.crates-io]
# This forces jsonwebtoken and ethers to use the patched Git version 
# instead of the vulnerable 0.16.20 version.
"ring:0.16.20" = { git = "https://github.com/briansmith/ring", branch = "main" }

# This forces all sub-dependencies to upgrade from the unmaintained 1.x version
"rustls-pemfile:1.0.4" = { version = "2.2.0" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
