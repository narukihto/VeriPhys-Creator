[package]
name = "veriphys-protocol-core"
version = "1.0.0"
authors = ["narukihto"]
edition = "2021"

[dependencies]
# Modern Async & Web (Replacing the vulnerable Iron/Hyper 0.10 stack)
axum = { version = "0.7.9", features = ["multipart"] }
tokio = { version = "1.36", features = ["full"] }
tower-http = { version = "0.5.2", features = ["cors", "limit"] }

# Security & Environment
dotenvy = "0.15.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography (FIPS 202 Standards)
sha3 = "0.10.8"
hex = "0.4"

# Blockchain (Modern TLS to fix 'ring' vulnerability)
ethers = { version = "2.0.14", features = ["rustls", "abigen"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
