[package]
name = "veriphys-protocol-core"
version = "1.0.0"
authors = ["narukihto"]
edition = "2021"

[dependencies]
# Modern Async & Web stack
axum = { version = "0.7.9", features = ["multipart"] }
tokio = { version = "1.36", features = ["full"] }
tower-http = { version = "0.5.2", features = ["cors", "limit"] }

# Environment & Serialization
dotenvy = "0.15.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography (FIPS 202)
sha3 = "0.10.8"
hex = "0.4"

# Blockchain with Rustls to avoid native-tls/ring conflicts
ethers = { version = "2.0.14", features = ["rustls", "abigen", "ws"] }

# Security fix: Unified direct dependency
ring = "=0.17.14"

[patch.crates-io]
# Forced override with '=' to resolve the "more than one candidate" ambiguity
# This fixes RUSTSEC-2025-0009 and the build error in GitHub Actions
ring = { version = "=0.17.14" }

# Addressing the unmaintained warning for rustls-pemfile
rustls-pemfile = { version = "2.1.0" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
