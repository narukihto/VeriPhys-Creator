[package]
name = "veriphys-protocol-core"
version = "1.0.0"
authors = ["narukihto"]
edition = "2021"

[dependencies]
# Modern Async & Web stack
axum = { version = "0.7.9", features = ["multipart"] }
tokio = { version = "1.36", features = ["full"] }
tower-http = { version = "0.5.2", features = ["cors", "limit"] }

# Environment & Serialization
dotenvy = "0.15.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography (FIPS 202)
sha3 = "0.10.8"
hex = "0.4"

# Blockchain with Rustls
ethers = { version = "2.0.14", features = ["rustls", "abigen", "ws"] }

# By adding this as a direct dependency, we force the tree to use 2.2.0
# and resolve the "unmaintained" warning without a patch conflict.
rustls-pemfile = "2.2.0"

[patch.crates-io]
# This remains a Git patch to avoid the "same source" error for ring
# and resolve the AES security vulnerability.
ring = { git = "https://github.com/briansmith/ring", branch = "main" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
