[package]
name = "veriphys-protocol-core"
version = "1.0.0"  
authors = ["narukihto"]
edition = "2021"
description = "VeriPhys Protocol: Secure SHA3-256 Asset Anchoring Engine"

[dependencies]
# --- Networking & API Framework ---
# Added 'macros' to tokio for #[tokio::main]
axum = { version = "0.7", features = ["multipart"] }
tokio = { version = "1.0", features = ["full", "macros", "fs"] } 
tower-http = { version = "0.5", features = ["cors"] }

# --- Data Serialization & Environment ---
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenv = "0.15"

# --- Blockchain & Cryptography ---
# Added 'hex' features to ethers for smoother byte handling
ethers = { version = "2.0", features = ["rustls", "abigen"] }
sha3 = "0.10"
hex = "0.4"
eyre = "0.6"

[profile.release]
# Level 3 optimization for high-performance hashing and verification
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'

[[bin]]
name = "veriphys-core"
path = "src/main.rs"
