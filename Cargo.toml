[package]
name = "veriphys-protocol-core"
version = "1.0.0"  
authors = ["narukihto"]
edition = "2021"
description = "Final: Protocol Infrastructure Complete - Secure Asset Anchoring Engine"

[dependencies]
# --- Networking & API Framework ---
# Axum for REST API and Multipart for file handling
axum = { version = "0.7", features = ["multipart"] }
tokio = { version = "1.0", features = ["full"] }
tower-http = { version = "0.5", features = ["cors"] }

# --- Data Serialization & Environment ---
# Serde for JSON and Dotenv for .env management
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenv = "0.15"

# --- Blockchain & Cryptography ---
# Ethers with abigen to connect with Solidity contracts
ethers = { version = "2.0", features = ["rustls", "abigen"] }
# Sha3 for quantum-resistant hashing
sha3 = "0.10"
# Hex for converting bytes to readable strings (Fixed the type mismatch error)
hex = "0.4"
eyre = "0.6"

[profile.release]
# Max optimization for high-speed hashing
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'
[[bin]]
name = "veriphys-protocol-core"
path = "src/main.rs" # تأكد أن هذا المسار يؤدي لملف الكود الرئيسي
