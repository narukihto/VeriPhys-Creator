[package]
name = "veriphys-protocol-core"
version = "1.0.0"  
authors = ["narukihto"]
edition = "2021"
description = "VeriPhys Protocol: Secure SHA3-256 Asset Anchoring Engine"

[dependencies]
# --- Web & Async Core ---
axum = "0.7.9" 
tokio = { version = "1.36", features = ["full"] }
tower-http = { version = "0.5.2", features = ["cors"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
multipart = "0.18"

# --- SECURITY FIXES ---
# Swap 'dotenv' (unmaintained) with 'dotenvy'
dotenvy = "0.15.7"

# --- Blockchain & Cryptography ---
# Merged ethers entries: 'rustls' helps bypass older 'ring' vulnerabilities
ethers = { version = "2.0.14", features = ["rustls", "abigen"] }
sha3 = "0.10.8"
hex = "0.4"
eyre = "0.6"

[profile.release]
# Level 3 optimization for industrial-grade hashing performance
opt-level = 3
lto = true
codegen-units = 1
panic = 'abort'

[[bin]]
name = "veriphys-core"
path = "src/main.rs"
